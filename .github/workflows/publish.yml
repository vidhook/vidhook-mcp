name: Publish

# npm 公開を OIDC Trusted Publishing で行う（NPM_TOKEN を保存しない）。
# - トリガ: `v*` タグの push（例 v0.1.1）、または手動。
# 事前設定（npmjs.com・1 度だけ）: パッケージ vidhook-mcp の Settings → Trusted Publisher に
#   GitHub repo = vidhook/vidhook-mcp / workflow = publish.yml（拡張子込み・完全一致）を登録する。
#   未登録 or 不一致だと OIDC が照合されず ENEEDAUTH で失敗する。
#
# npm 公式の OIDC 手順に合わせ、ここだけ mise ではなく actions/setup-node + registry-url を使う
# （registry を npm に明示しないと OIDC が起動せず ENEEDAUTH になるため）。node>=22.14・npm>=11.5.1 必須。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write # OIDC トークン発行（Trusted Publishing に必須）
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing は npm >= 11.5.1 が必須（node 同梱版が古い場合に備え明示更新）。
      - name: Ensure npm supports OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Enable pnpm
        run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile

      # タグ起動時はタグ（vX.Y.Z）と package.json version の一致を強制する。
      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # OIDC Trusted Publishing: id-token があり .npmrc に認証トークンが無ければ npm が
      # 自動で OIDC 認証し provenance も付与する。workspace 依存が無いため npm publish を直接使える。
      #
      # 注意（npm >= 11.18）: setup-node は registry-url 指定時に userconfig の .npmrc へ
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` を書き、NODE_AUTH_TOKEN に
      # placeholder 値を入れる。npm 11.18 以降は「トークンが存在するなら OIDC を試みずトークン認証」
      # に挙動が変わったため、この placeholder トークンで publish が 403 になる（OIDC が発火しない）。
      # publish 直前にこのトークン行を削除し、OIDC trusted publishing を確実に発火させる（registry 設定は残す）。
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          npm publish --access public
